{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show mt-4" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <div class="card shadow border-0 mt-5">
                <div class="card-body p-4">
                    <h3 class="text-center fw-bold mb-4">Create Account</h3>
                    
                    <form method="POST" action="{% url 'signup' %}">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label small fw-bold">USERNAME</label>
                            <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold">EMAIL</label>
                            <input type="email" name="email" class="form-control" placeholder="example@email.com" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold">PASSWORD</label>
                            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small fw-bold">I AM A:</label>
                            <select name="role" class="form-select">
                                <option value="CANDIDATE">Candidate (Job Seeker)</option>
                                <option value="RECRUITER">Recruiter (Hiring Manager)</option>
                            </select>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg shadow-sm">Register</button>
                        </div>
                    </form>

                    <div class="text-center mt-3">
                        <small class="text-muted">Already have an account? <a href="{% url 'login' %}" class="text-decoration-none">Login here</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

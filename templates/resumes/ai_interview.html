{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-body bg-dark text-white rounded">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h4 class="fw-bold mb-0">Technical Assessment</h4>
                            <p class="small mb-0 opacity-75">Topic: {{ interview.missing_skills }}</p>
                        </div>
                        <div class="text-end">
                            <span class="badge bg-warning text-dark p-2" id="timer">Time Remaining: 10:00</span>
                        </div>
                    </div>
                </div>
            </div>

            <form method="POST" id="interviewForm">
                {% csrf_token %}
                
                {% for question in questions %}
                <div class="card shadow-sm border-0 mb-4 animate-up">
                    <div class="card-body p-4">
                        <h6 class="fw-bold text-primary mb-3">Question {{ forloop.counter }}</h6>
                        <p class="lead" style="font-size: 1.1rem;">{{ question.question }}</p>
                        
                        <div class="mt-3">
                            <textarea 
                                name="answer_{{ question.id }}" 
                                class="form-control border-0 bg-light" 
                                rows="4" 
                                placeholder="Type your detailed answer here..."
                                required></textarea>
                        </div>
                    </div>
                </div>
                {% endfor %}

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg shadow">
                        <i class="fas fa-paper-plane me-2"></i>Submit Final Assessment
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Simple Timer Logic
    let timeLeft = 600; // 10 minutes in seconds
    const timerElement = document.getElementById('timer');

    const countdown = setInterval(() => {
        if (timeLeft <= 0) {
            clearInterval(countdown);
            document.getElementById('interviewForm').submit();
        } else {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            timerElement.innerHTML = `Time Remaining: ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }
        timeLeft -= 1;
    }, 1000);
</script>

<style>
    .animate-up {
        transition: transform 0.3s ease;
    }
    .animate-up:hover {
        transform: translateY(-3px);
    }
    textarea:focus {
        box-shadow: none !important;
        background-color: #fff !important;
        border: 1px solid #0d6efd !important;
    }
</style>
{% endblock %}

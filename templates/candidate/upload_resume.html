<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Resume</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'candidate-dashboard' %}">
            Candidate Portal
        </a>

        <div>
            <a href="{% url 'candidate-dashboard' %}" class="btn btn-outline-light btn-sm">
                Dashboard
            </a>
        </div>
    </div>
</nav>

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">

            <div class="card shadow-sm border-0">
                <div class="card-body p-4">

                    <h3 class="fw-bold mb-2">Upload Resume</h3>
                    <p class="text-muted mb-4">
                        Upload your PDF resume to extract skills and get job recommendations.
                    </p>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }}">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Resume PDF</label>
                            <input type="file" name="resume" class="form-control" accept="application/pdf" required>
                            <div class="form-text">
                                Only PDF files are supported.
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            Upload & Analyze Resume
                        </button>
                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
